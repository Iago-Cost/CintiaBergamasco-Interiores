<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Portfólio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { cursor: default !important; overflow-y: auto !important; }
  .admin-container { max-width: 1400px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .admin-panel { background: rgba(255,255,255,0.02); border: 1px solid var(--line); padding: 30px; border-radius: 4px; }
  .preview-panel { position: sticky; top: 40px; background: rgba(0,0,0,0.2); border: 1px dashed var(--gold); padding: 20px; border-radius: 4px; height: fit-content; }
  .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .form-group label { color: var(--gold); font-family: 'Jost', sans-serif; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
  .form-group input, .form-group textarea { background: #1a1512; border: 1px solid var(--line); padding: 12px; color: var(--cream); font-family: 'Jost', sans-serif; border-radius: 2px; width: 100%;}
  .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); outline: none; }
  
  .image-row-item { background: rgba(0,0,0,0.3); border: 1px solid var(--line); padding: 20px; margin-bottom: 20px; border-radius: 4px; }
  .image-row-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
  .image-row-header img { width: 80px; height: 60px; object-fit: cover; border: 1px solid var(--gold); }
  
  .btn-danger { background: #8b2525 !important; color: white; border: none; padding: 8px 16px; cursor: pointer; font-size: 12px; transition: 0.3s; font-family: 'Jost', sans-serif; text-transform: uppercase; letter-spacing: 2px;}
  .btn-danger:hover { background: #a82e2e !important; }
  .blocks-list { margin-top: 40px; border-top: 1px solid var(--line); padding-top: 30px; }
  .block-item { display: flex; justify-content: space-between; align-items: center; background: #1a1512; padding: 15px; border: 1px solid var(--line); margin-bottom: 10px;}
  .auth-overlay { position: fixed; inset: 0; background: var(--charcoal); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
</style>
</head>
<body>

<div id="authOverlay" class="auth-overlay">
  <h2 class="section-title">Acesso <em>Restrito</em></h2>
  <div class="form-group" style="width: 300px;">
    <input type="password" id="adminPassword" placeholder="Digite a senha master" style="text-align: center;">
    <button type="button" onclick="checkAdminAuth()" class="hero-cta" style="margin-top: 10px; width: 100%; justify-content: center;">Entrar</button>
  </div>
</div>

<div class="admin-container">
  <div class="admin-panel">
    <h2 class="section-title" id="formActionTitle" style="font-size: 32px;">Criar Novo <em>Bloco</em></h2>
    <form id="managerForm">
      <input type="hidden" id="editingBlockId" value="">
      
      <div class="form-group">
        <label>Título do Bloco</label>
        <input type="text" id="blockTitle" required placeholder="Ex: Quarto de Casal" oninput="updateLivePreview()">
      </div>
      
      <div class="form-group">
        <label>Subtítulo/Categoria (Card Principal)</label>
        <input type="text" id="blockDesc" required placeholder="Ex: Residencial">
      </div>
      
      <div class="form-group">
        <label>Link Externo (Botão Final - Opcional)</label>
        <input type="url" id="blockLink" placeholder="https://..." oninput="updateLivePreview()">
      </div>
      
      <div class="form-group" style="background: rgba(201, 169, 110, 0.05); padding: 20px; border: 1px dashed var(--gold);">
        <label>Adicionar Imagens (Explorador)</label>
        <p style="font-size: 12px; color: var(--taupe); margin-bottom: 10px;">As imagens serão comprimidas automaticamente.</p>
        <input type="file" id="filePicker" multiple accept="image/*" onchange="handleFileSelection()" style="padding: 5px; background: transparent; border: none;">
      </div>

      <div id="imagesCustomizationContainer"></div>

      <button type="submit" class="hero-cta" style="width: 100%; justify-content: center; background: var(--gold); color: var(--charcoal); font-weight: 500; font-size: 14px;">Salvar no Supabase</button>
      <button type="button" id="cancelEditBtn" class="btn-danger" style="display:none; width: 100%; margin-top: 10px; padding: 16px;" onclick="resetAdminForm()">Cancelar Edição</button>
    </form>

    <div class="blocks-list">
      <h3 class="section-title" style="font-size: 24px; margin-bottom: 20px;">Gerenciar <em>Projetos</em></h3>
      <div id="currentBlocksContainer"></div>
    </div>
  </div>

  <div class="preview-panel">
    <h3 class="section-title" style="font-size: 18px; margin-bottom: 20px; color: var(--gold);">Visualização em <em>Tempo Real</em></h3>
    
    <div class="project-view-modal" style="display: block; position: relative; inset: auto; background: transparent; backdrop-filter: none; z-index: 1;">
      <div class="modal-content project-card-content" style="width: 100%; max-width: 100%; padding: 25px; background: #221c19; box-shadow: none;">
        <div class="project-modal-grid" style="grid-template-columns: 1fr; gap: 20px;">
          
          <div class="carousel-container">
            <div class="image-viewer-layout">
              <button type="button" class="carousel-nav carousel-prev" id="prevImageBtnPreview" style="display:none;">&#10094;</button>
              
              <div class="main-img-wrapper" style="height: 300px;">
                <img id="prevMainImg" src="" alt="Preview Imagem">
                <button type="button" id="zoomBtnPreview" class="zoom-btn" title="Ampliar Imagem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
              </div>
              
              <button type="button" class="carousel-nav carousel-next" id="nextImageBtnPreview" style="display:none;">&#10095;</button>
            </div>
            <div class="thumbnails" id="prevThumbnails"></div>
          </div>
          
          <div class="project-info-side">
            <h2 id="prevTitle" class="section-title" style="font-size: 26px;">Título do Bloco</h2>
            <div class="image-desc-container" id="prevImgDesc">
              <p>O HTML que você digitar aparecerá renderizado aqui...</p>
            </div>
            <a id="prevLinkBtn" href="#" class="hero-cta" style="margin-top: 10px; width: fit-content; display: none;">Acessar Link</a>
          </div>
          
        </div>
      </div>
    </div>
  </div>
</div>

<div id="zoomModal" class="custom-modal zoom-modal-overlay">
  <span class="close-btn zoom-close-btn" id="closeZoomBtn">&times;</span>
  <img id="zoomModalImg" src="" alt="Imagem Ampliada">
</div>

<!-- SDK DO SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // --- CONFIGURAÇÃO SUPABASE ADMIN ---
  const supabaseUrl = 'https://sydaajqyxwyedbinoubt.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5ZGFhanF5eHd5ZWRiaW5vdWJ0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mzc3MDc0OCwiZXhwIjoyMDk5MzQ2NzQ4fQ.-zpmm2h6K5sNjf8_B0uq-7QLQZbhn9oDJaAgiXG_Ro8';
  
  // Nome da constante alterado para supabaseAdmin garantindo nenhum conflito
  const supabaseAdmin = window.supabase.createClient(supabaseUrl, supabaseKey);

  let loadedImagesData = [];
  let activePreviewIdx = 0;

  function checkAdminAuth() {
    if(document.getElementById('adminPassword').value === 'CintiaDesign2026') {
      document.getElementById('authOverlay').style.display = 'none';
      initAdminManager();
    } else { 
      alert('Senha incorreta.'); 
    }
  }

  function compressImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function (event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function () {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 1200; const MAX_HEIGHT = 900;
          let width = img.width; let height = img.height;
          if (width > height) {
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
          } else {
            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.65)); 
        };
      };
    });
  }

  async function handleFileSelection() {
    const files = document.getElementById('filePicker').files;
    for(let file of files) {
      const compressedBase64 = await compressImage(file);
      loadedImagesData.push({
        url: compressedBase64,
        desc: '<h3 style="color: var(--gold); font-family: \'Cormorant Garamond\', serif; font-size: 24px;">Ambiente Detalhado</h3><p style="color: var(--taupe); font-size: 15px;">Escreva sua descrição aqui com tags HTML...</p>'
      });
    }
    document.getElementById('filePicker').value = ""; 
    renderImagesCustomizer();
    updateLivePreview();
  }

  function renderImagesCustomizer() {
    const container = document.getElementById('imagesCustomizationContainer');
    container.innerHTML = '';
    
    loadedImagesData.forEach((img, idx) => {
      const row = document.createElement('div');
      row.className = 'image-row-item';
      row.innerHTML = `
        <div class="image-row-header">
          <img src="${img.url}">
          <span>Informações da Imagem #${idx + 1}</span>
          <button type="button" class="btn-danger" style="margin-left: auto;" onclick="removeImage(${idx})">Remover Foto</button>
        </div>
        <div class="form-group">
          <label>Descrição Livre (Aceita Tags HTML)</label>
          <textarea style="height: 120px;" oninput="updateImageProp(${idx}, 'desc', this.value)">${img.desc}</textarea>
        </div>
      `;
      container.appendChild(row);
    });
  }

  function updateImageProp(idx, prop, value) {
    loadedImagesData[idx][prop] = value;
    updateLivePreview();
  }

  function removeImage(idx) {
    loadedImagesData.splice(idx, 1);
    if(activePreviewIdx >= loadedImagesData.length) activePreviewIdx = 0;
    renderImagesCustomizer();
    updateLivePreview();
  }

  function updateLivePreview() {
    document.getElementById('prevTitle').innerText = document.getElementById('blockTitle').value || 'Título do Bloco';
    const linkVal = document.getElementById('blockLink').value;
    const linkBtn = document.getElementById('prevLinkBtn');
    if (linkVal) { linkBtn.style.display = 'inline-flex'; } else { linkBtn.style.display = 'none'; }
    
    const mainImg = document.getElementById('prevMainImg');
    const descEl = document.getElementById('prevImgDesc');
    const thumbContainer = document.getElementById('prevThumbnails');
    const prevBtn = document.getElementById('prevImageBtnPreview');
    const nextBtn = document.getElementById('nextImageBtnPreview');
    
    thumbContainer.innerHTML = '';
    if(loadedImagesData.length === 0) {
      mainImg.src = ''; descEl.innerHTML = '<p>Nenhuma imagem.</p>'; 
      prevBtn.style.display = 'none'; nextBtn.style.display = 'none'; return;
    }
    
    if (loadedImagesData.length > 1) {
      prevBtn.style.display = 'flex'; nextBtn.style.display = 'flex';
    } else {
      prevBtn.style.display = 'none'; nextBtn.style.display = 'none';
    }

    prevBtn.onclick = (e) => { e.preventDefault(); activePreviewIdx--; if (activePreviewIdx < 0) activePreviewIdx = loadedImagesData.length - 1; updateLivePreview(); };
    nextBtn.onclick = (e) => { e.preventDefault(); activePreviewIdx++; if (activePreviewIdx >= loadedImagesData.length) activePreviewIdx = 0; updateLivePreview(); };
    
    const activeData = loadedImagesData[activePreviewIdx];
    mainImg.src = activeData.url;
    descEl.innerHTML = activeData.desc;
    
    loadedImagesData.forEach((img, idx) => {
      const th = document.createElement('img');
      th.src = img.url;
      if(idx === activePreviewIdx) th.className = 'active';
      th.onclick = () => { activePreviewIdx = idx; updateLivePreview(); };
      thumbContainer.appendChild(th);
    });
  }

  const zoomBtnPreview = document.getElementById('zoomBtnPreview');
  const zoomModal = document.getElementById('zoomModal');
  const zoomModalImg = document.getElementById('zoomModalImg');
  const closeZoomBtn = document.getElementById('closeZoomBtn');

  if (zoomBtnPreview && zoomModal) {
    zoomBtnPreview.addEventListener('click', () => { zoomModalImg.src = document.getElementById('prevMainImg').src; zoomModal.style.display = 'flex'; });
    closeZoomBtn.addEventListener('click', () => zoomModal.style.display = 'none' );
    window.addEventListener('click', (e) => { if (e.target === zoomModal) zoomModal.style.display = 'none'; });
  }

  // SALVAR NO SUPABASE (Usando supabaseAdmin)
  document.getElementById('managerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('editingBlockId').value || 'id_' + Date.now();
    
    const blockData = {
      id: id,
      title: document.getElementById('blockTitle').value,
      desc: document.getElementById('blockDesc').value,
      info: '',
      link: document.getElementById('blockLink').value,
      images: loadedImagesData
    };
    
    const { error } = await supabaseAdmin.from('projetos').upsert(blockData);
    
    if (error) {
      alert("Erro ao salvar no Supabase: " + error.message);
    } else {
      alert("Projeto salvo com sucesso na Nuvem!");
      resetAdminForm();
      initAdminManager();
    }
  });

  // BUSCAR DO SUPABASE PARA LISTAGEM (Usando supabaseAdmin)
  async function initAdminManager() {
    const { data: blocks, error } = await supabaseAdmin.from('projetos').select('*').order('created_at', { ascending: true });
    
    if (error) { console.error(error); return; }
    
    const container = document.getElementById('currentBlocksContainer');
    container.innerHTML = '';
    
    blocks.forEach(b => {
      const div = document.createElement('div');
      div.className = 'block-item';
      
      let imgArray = [];
      if (b.images && Array.isArray(b.images)) { imgArray = b.images; }
      else if (typeof b.images === 'string') { try { imgArray = JSON.parse(b.images); } catch(e){} }

      div.innerHTML = `
        <div>
          <strong style="color: var(--cream); font-size: 16px;">${b.title}</strong><br>
          <span style="color: var(--taupe); font-size: 12px;">${imgArray.length} fotos</span>
        </div>
        <div style="display:flex; gap: 8px;">
          <button type="button" class="hero-cta" style="padding: 8px 16px; font-size:10px;" onclick="editBlock('${b.id}')">Editar</button>
          <button type="button" class="btn-danger" onclick="deleteBlock('${b.id}')">Apagar</button>
        </div>
      `;
      container.appendChild(div);
    });
  }

  window.editBlock = async function(id) {
    const { data, error } = await supabaseAdmin.from('projetos').select('*').eq('id', id).single();
    if(error || !data) return;
    
    document.getElementById('editingBlockId').value = data.id;
    document.getElementById('blockTitle').value = data.title;
    document.getElementById('blockDesc').value = data.desc;
    document.getElementById('blockLink').value = data.link || '';
    
    if (data.images && Array.isArray(data.images)) { loadedImagesData = data.images; }
    else if (typeof data.images === 'string') { try { loadedImagesData = JSON.parse(data.images); } catch(e){ loadedImagesData = [];} }
    else { loadedImagesData = []; }

    activePreviewIdx = 0;
    
    document.getElementById('formActionTitle').innerHTML = 'Editando: <em>' + data.title + '</em>';
    document.getElementById('cancelEditBtn').style.display = 'block';
    
    renderImagesCustomizer();
    updateLivePreview();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteBlock = async function(id) {
    if(confirm('Tem certeza? Isso apagará este projeto definitivamente da nuvem.')) {
      const { error } = await supabaseAdmin.from('projetos').delete().eq('id', id);
      if(error) {
        alert("Erro ao excluir: " + error.message);
      } else {
        initAdminManager();
        if(document.getElementById('editingBlockId').value === id) resetAdminForm();
      }
    }
  };

  function resetAdminForm() {
    document.getElementById('managerForm').reset();
    document.getElementById('editingBlockId').value = '';
    loadedImagesData = [];
    activePreviewIdx = 0;
    document.getElementById('formActionTitle').innerHTML = 'Criar Novo <em>Bloco</em>';
    document.getElementById('cancelEditBtn').style.display = 'none';
    renderImagesCustomizer();
    updateLivePreview();
  }
</script>
</body>
</html>
